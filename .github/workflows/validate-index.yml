name: Validate Registry Index

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Validate helper scripts syntax
        run: python -m py_compile scripts/validate_index.py scripts/update_registry_entry.py scripts/registry_admin.py

      - name: Validate registry-index.toml
        run: python scripts/validate_index.py
