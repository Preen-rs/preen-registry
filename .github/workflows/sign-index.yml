name: Sign Registry Index

on:
  push:
    branches: [main]
    paths:
      - "registry-index.toml"
      - "scripts/validate_index.py"
      - "scripts/update_registry_entry.py"
      - "scripts/registry_admin.py"
      - ".github/workflows/sign-index.yml"
      - ".github/workflows/validate-index.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sign-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate index before signing
        run: python scripts/validate_index.py

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign registry index (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature registry-index.toml.sig \
            --output-certificate registry-index.toml.pem \
            registry-index.toml

      - name: Verify just-generated signature
        run: |
          cosign verify-blob \
            --signature registry-index.toml.sig \
            --certificate registry-index.toml.pem \
            --certificate-identity-regexp "https://github.com/Preen-rs/preen-registry/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            registry-index.toml

      - name: Commit updated signature
        run: |
          if git diff --quiet -- registry-index.toml.sig; then
            echo "No signature changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry-index.toml.sig
          git commit -m "chore(registry): update index signature [skip ci]"
          git push
