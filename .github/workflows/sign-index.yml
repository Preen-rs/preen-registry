name: Sign Registry Index

on:
  push:
    branches: [main]
    paths:
      - "registry-index.toml"
      - "scripts/validate_index.py"
      - "scripts/update_registry_entry.py"
      - "scripts/registry_admin.py"
      - ".github/workflows/sign-index.yml"
      - ".github/workflows/validate-index.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sign-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Validate index before signing
        run: python scripts/validate_index.py

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign registry index (keyless)
        run: |
          cosign sign-blob --yes \
            --bundle registry-index.toml.sig \
            registry-index.toml
          test -s registry-index.toml.sig

      - name: Verify just-generated signature
        run: |
          cosign verify-blob \
            --bundle registry-index.toml.sig \
            --certificate-identity-regexp "https://github.com/Preen-rs/preen-registry/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            registry-index.toml

      - name: Commit updated signature
        run: |
          git add -f registry-index.toml.sig
          if git diff --cached --quiet -- registry-index.toml.sig; then
            echo "No signature changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(registry): update index signature [skip ci]"
          git push
